<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Kanmani </title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:'Poppins','Segoe UI',sans-serif;
overflow:hidden;
background:linear-gradient(135deg,#ffd6e0,#ffe6f0);
color:#ff4d6d;
}

/* PAGE */
.page{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;
text-align:center;
padding:20px;
opacity:0;
transform:translateX(100%);
transition:all .6s ease;
}
.page.active{
opacity:1;
transform:translateX(0);
}

/* SECTIONS */
.center{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}
.bottom{margin-bottom:20px;}
.top{margin-top:10px;}

/* TEXT */
h1{font-size:26px;margin:10px 0;}
h2{font-size:22px;}
p{font-size:16px;max-width:320px;line-height:1.5;}

/* BUTTON */
button{
padding:12px 22px;
font-size:16px;
border-radius:25px;
border:none;
background:#ff4d6d;
color:#fff;
width:80%;
max-width:260px;
margin-top:10px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
transition:all .2s ease;
position:relative;
overflow:hidden;
}

/* Button hover/press */
button:active{
transform:scale(.95);
}

/* Ripple effect */
button::after{
content:"";
position:absolute;
width:10px;height:10px;
background:rgba(255,255,255,.5);
border-radius:50%;
transform:scale(0);
opacity:0;
}
button:active::after{
animation:ripple .5s;
}
@keyframes ripple{
to{transform:scale(20);opacity:0;}
}

/* Glow pulse */
button{
animation:glow 2s infinite;
}
@keyframes glow{
50%{box-shadow:0 0 15px rgba(255,77,109,.6);}
}

/* STICKER */
.sticker img{
width:110px;
animation:floaty 2s infinite;
transition:.3s;
}
@keyframes floaty{
50%{transform:translateY(-10px);}
}

/* CAKE */
.cake-box{
font-size:80px;
position:relative;
margin:20px 0;
animation:bounce 1s infinite;
}
@keyframes bounce{
50%{transform:translateY(-10px);}
}

/* FLAME */
.flame{
position:absolute;
top:-12px;
left:50%;
width:8px;height:12px;
background:orange;
border-radius:50%;
transform:translateX(-50%);
animation:flicker .2s infinite alternate;
}
@keyframes flicker{
to{transform:translateX(-50%) scale(1.3);}
}

/* FIREWORK */
.fire{
position:fixed;
animation:burst 1.5s forwards;
}
@keyframes burst{
to{transform:translate(var(--x),var(--y)) scale(1.5);opacity:0;}
}

/* FLOAT HEART */
.heart{
position:fixed;
bottom:-20px;
animation:floatHeart linear forwards;
}
@keyframes floatHeart{
to{transform:translateY(-120vh);opacity:0;}
}

/* FLOAT STICKER */
.float-sticker{
position:fixed;
animation:floatSticker linear forwards;
}
@keyframes floatSticker{
to{transform:translateY(-120vh);opacity:0;}
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}
.gallery img{
width:100%;
border-radius:12px;
}

/* PROGRESS */
.progress{
width:50%;
height:6px;
background:#ffc1d6;
border-radius:10px;
}
.bar{
height:100%;
width:0%;
background:#ff4d6d;
}
</style>
</head>

<body>

<audio id="music" src="music.mp3" loop></audio>
<audio id="cheer" src="cheer.mp3"></audio>
<audio id="cut" src="cut.mp3"></audio>

<!-- LOADING -->
<div class="page active">
<div class="center">
<div class="cake-box"><div id="flame" class="flame"></div></div>
<p>Loading your birthday surprise… </p>
<div class="progress"><div id="bar" class="bar"></div></div>
</div>
</div>

<!-- INTRO -->
<div class="page">
<div class="center">
<div class="sticker" onclick="gifTap(this)"><img src="sticker1.gif"></div>
<h2>a cutiepie was born today… </h2>
<p>31 years ago </p>
</div>
<div class="bottom"><button onclick="nextPage()">Continue</button></div>
</div>

<!-- START -->
<div class="page">
<div class="center">
<div class="sticker" onclick="gifTap(this)"><img src="sticker2.gif"></div>
<h1>Kanmani </h1>
</div>
<div class="bottom"><button onclick="start()">Start</button></div>
</div>

<!-- BDAY -->
<div class="page">
<div class="top"><h1>Happy Birthday </h1></div>

<div class="center">
<div id="cakeBox" class="cake-box">
<span id="cakeMain"></span>
<div id="flame2" class="flame" style="display:none;"></div>
</div>
</div>

<div class="bottom">
<button id="lightBtn" onclick="light()">Light Candle</button>
<button id="celeBtn" onclick="celebrate()" style="display:none;">Celebrate</button>
<button id="cutBtn" onclick="cutCake()" style="display:none;">Cut Cake</button>
<button id="memBtn" onclick="nextPage()" style="display:none;">Our Memories</button>
</div>
</div>

<!-- MEMORY -->
<div class="page">
<div class="center">
<div class="gallery">
<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">
<img src="photo5.jpg">
</div>
</div>
<div class="bottom"><button onclick="nextPage()">Next</button></div>
</div>

<!-- FINAL -->
<div class="page">
<div class="center">
<div class="sticker" onclick="gifTap(this)"><img src="sticker5.gif"></div>
<p id="text"></p>
</div>
</div>

<script>
let pages=document.querySelectorAll(".page");
let current=0;

/* Loading */
let p=0;
let bar=document.getElementById("bar");
let load=setInterval(()=>{
p++;
bar.style.width=p+"%";
if(p>=100){
clearInterval(load);
setTimeout(nextPage,800);
}
},40);

/* Navigation */
function nextPage(){
pages[current].classList.remove("active");
current++;
pages[current].classList.add("active");
if(current===5) type();
}

/* Start */
function start(){
music.play();
nextPage();
}

/* Candle */
function light(){
flame2.style.display="block";
lightBtn.style.display="none";
celeBtn.style.display="inline-block";
}

/* Fireworks */
function fire(x,y){
for(let i=0;i<20;i++){
let f=document.createElement("div");
f.className="fire";
f.innerHTML=["","✨","",""][Math.floor(Math.random()*4)];
f.style.left=x+"px";
f.style.top=y+"px";
let a=Math.random()*2*Math.PI;
let d=Math.random()*150+50;
f.style.setProperty("--x",Math.cos(a)*d+"px");
f.style.setProperty("--y",Math.sin(a)*d+"px");
document.body.appendChild(f);
setTimeout(()=>f.remove(),1500);
}
}

function celebrate(){
cheer.play();
celeBtn.style.display="none";
cutBtn.style.display="inline-block";

let t=setInterval(()=>{
fire(Math.random()*innerWidth,Math.random()*innerHeight);
},300);

setTimeout(()=>clearInterval(t),4000);
}

/* Cake */
function cutCake(){
cut.play();
cakeMain.innerHTML="";
cutBtn.style.display="none";
memBtn.style.display="inline-block";
}

/* GIF tap */
function gifTap(el){
el.style.transform="scale(1.2)";
setTimeout(()=>el.style.transform="",300);
}

/* Floating hearts */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(Math.random()*20+15)+"px";
h.style.animationDuration=(Math.random()*3+3)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},400);

/* Floating stickers */
setInterval(()=>{
let s=document.createElement("img");
s.src="sticker2.gif";
s.className="float-sticker";
s.style.left=Math.random()*100+"vw";
s.style.bottom="-20px";
s.style.width="60px";
s.style.animationDuration=(Math.random()*4+4)+"s";
document.body.appendChild(s);
setTimeout(()=>s.remove(),7000);
},900);

/* Typing */
let msg=`Sometimes life doesn’t go the way we wish it would…

And even though we found something real in each other,
something beautiful that started at Wonderla…

we both know things aren’t as simple as just staying together.

But still…

I want you to know this from the bottom of my heart —

meeting you was never a mistake,
loving you was never wrong,
and every moment with you is something I’ll always hold close to me.

You are special, Kanmani…
in ways I can’t even fully explain.

And today isn’t about what we couldn’t have,
it’s about celebrating YOU — the amazing, kind, beautiful person you are.

So I hope you smile today,
I hope you feel loved today,
and I hope your heart is light and happy.

Happy Birthday, Kanmani 

No matter what happens…
you will always mean something truly special to me.

Happy Birthday Kanmani `;
let i=0;

function type(){
let el=document.getElementById("text");
function t(){
if(i<msg.length){
el.innerHTML+=msg[i];
i++;
setTimeout(t,40);
}
}
t();
}
</script>

</body>
</html>
